# Render Blueprint — deploys the Express API.
# Connect this repo on https://dashboard.render.com → New → Blueprint.
services:
  - type: web
    name: milkosamuel-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_URL
        sync: false # set in dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # set in dashboard (secret)
      - key: CLIENT_URL
        sync: false # e.g. https://your-app.vercel.app
      - key: NODE_ENV
        value: production
